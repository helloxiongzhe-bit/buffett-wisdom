<!--
  2048 游戏 - 超级果冻 Q 弹版
  
  设计特点：
    - 独立游戏页面，左上角浮动返回按钮
    - 自适应一屏布局：移动端（最小支持 vivo X200 Pro Mini）& PC端（最小支持13寸 MacBook Air）
    - 深紫色渐变背景 + 动态光效，独立于全局 styles.css 的配色
    - 毛玻璃棋盘 + 方块渐变色梯度（2→2048 共 11 级配色）
    - 丰富果冻动画：出现/合并/撞墙/阻挡弹跳
    - 分数飞行粒子 + 计分板翻转动画
    - 撤销系统（最多 10 步）/ 连击提示 / 棋盘震动
    - 支持键盘（方向键/WASD）+ 触摸滑动 + 鼠标拖拽
-->
<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <base href="../../">
    <title>2048 - 超级果冻版</title>

    <!-- 主题初始化（闪烁预防） -->
    <script>
        (function() {
            var theme = localStorage.getItem('buffett-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- 2048 专用字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@600;700;800;900&family=Noto+Sans+SC:wght@500;700;900&family=Orbitron:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- 全局样式 & 导航栏依赖 -->
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">

    <!-- 2048 游戏样式 -->
    <link rel="stylesheet" href="./games/2048/style.css">

    <style>
        /* === 全屏一屏布局 === */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            max-width: 520px;
            padding: 8px 12px;
            box-sizing: border-box;
        }

        /* === 标题行：紧凑 === */
        .header-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .header-row h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin: 0;
            line-height: 1;
        }

        .header-row .game-subtitle {
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            margin-top: 2px;
        }

        /* === 分数盒子 - 紧凑版 === */
        .score-row {
            display: flex;
            gap: 6px;
        }

        .score-row .score-box {
            min-width: 80px;
            padding: 4px 10px 6px !important;
            border-radius: 10px !important;
        }

        .score-row .score-box .text-xs {
            font-size: 0.55rem;
        }

        .score-row .score-box .score-value-display {
            font-size: 1.6rem;
            line-height: 2rem;
        }

        .score-row .score-digit {
            height: 2rem;
            line-height: 2rem;
            font-size: 1.6rem;
        }

        .score-row .score-digit-inner,
        .score-row .score-digit-old,
        .score-row .score-digit-new {
            line-height: 2rem;
        }

        /* === 按钮行 === */
        .btn-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 6px;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-row .action-btn {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 8px !important;
        }

        .btn-row .action-btn svg {
            width: 14px;
            height: 14px;
        }

        /* === 得分动画容器 === */
        #score-popup-container {
            height: 0;
            width: 100%;
            position: relative;
        }

        /* === 棋盘：自适应，占据剩余空间 === */
        .board-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
        }

        /* === 提示文字 === */
        .hint-row {
            width: 100%;
            text-align: center;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .hint-row p {
            font-size: 11px;
            opacity: 0.6;
            margin: 0;
        }

        /* === 统计栏：紧凑 === */
        .stats-row {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .stats-row .stat-card {
            padding: 6px 8px;
            border-radius: 10px;
            text-align: center;
        }

        .stats-row .stat-card .label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(248,250,252,0.7);
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
        }

        .stats-row .stat-card .value {
            font-size: 1.1rem;
            font-weight: 800;
            color: #f8fafc;
            font-family: 'Righteous', 'Nunito', sans-serif;
        }

        /* ============================================
           移动端响应式（vivo X200 Pro Mini: ~393×873）
           ============================================ */
        @media (max-height: 700px) {
            #game-container {
                padding: 4px 8px;
            }
            .header-row {
                margin-bottom: 4px;
            }
            .header-row h1 {
                font-size: 1.5rem;
            }
            .header-row .game-subtitle {
                display: none;
            }
            .score-row .score-box {
                min-width: 64px;
                padding: 3px 8px 4px !important;
            }
            .score-row .score-box .score-value-display,
            .score-row .score-digit {
                font-size: 1.2rem;
                line-height: 1.5rem;
            }
            .score-row .score-digit-inner,
            .score-row .score-digit-old,
            .score-row .score-digit-new {
                line-height: 1.5rem;
            }
            .score-row .score-digit {
                height: 1.5rem;
            }
            .btn-row {
                margin-bottom: 4px;
            }
            .btn-row .action-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
            .stats-row {
                margin-top: 4px;
            }
            .stats-row .stat-card {
                padding: 4px 6px;
            }
            .stats-row .stat-card .label {
                font-size: 9px;
            }
            .stats-row .stat-card .value {
                font-size: 0.9rem;
            }
        }

        /* 超小屏幕（如 iPhone SE 等 < 380px 宽） */
        @media (max-width: 380px) {
            .score-row .score-box {
                min-width: 56px;
                padding: 2px 6px 3px !important;
            }
            .score-row .score-box .text-xs {
                font-size: 0.5rem;
            }
            .score-row .score-box .score-value-display,
            .score-row .score-digit {
                font-size: 1rem;
                line-height: 1.3rem;
            }
            .score-row .score-digit {
                height: 1.3rem;
            }
        }

        /* PC 端小屏优化（13 寸 MacBook Air，iframe 可能 ~956px 高度减去上方标题） */
        @media (min-width: 768px) {
            #game-container {
                padding: 10px 16px;
                max-width: 480px;
            }
            .header-row {
                margin-bottom: 8px;
            }
            .btn-row {
                margin-bottom: 6px;
            }
            .stats-row {
                margin-top: 8px;
            }
        }

        /* PC 端大屏幕（宽裕空间） */
        @media (min-width: 768px) and (min-height: 800px) {
            #game-container {
                max-width: 520px;
                padding: 12px 20px;
            }
            .score-row .score-box {
                min-width: 100px;
                padding: 6px 12px 8px !important;
            }
            .score-row .score-box .score-value-display,
            .score-row .score-digit {
                font-size: 2rem;
                line-height: 2.4rem;
            }
            .score-row .score-digit {
                height: 2.4rem;
            }
            .score-row .score-digit-inner,
            .score-row .score-digit-old,
            .score-row .score-digit-new {
                line-height: 2.4rem;
            }
        }
        /* === 为顶部导航栏留出空间 === */
        body {
            padding-top: 56px !important;
        }

        /* 覆盖全局装饰元素 */
        .grid-bg { background-image: none !important; }
        .radial-glow, .scroll-progress, .cursor-glow { display: none !important; }
        .page-wrapper {
            will-change: auto !important;
            min-height: auto !important;
            height: calc(100vh - 56px) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
    </style>
</head>
<body>

  <!-- 游戏容器 -->
  <div id="game-container">

    <!-- 标题 + 分数 -->
    <div class="header-row">
      <div>
        <h1>2048</h1>
        <p class="game-subtitle" style="margin:0;">合并数字，挑战2048！</p>
      </div>
      <div class="score-row">
        <div class="score-box">
          <div class="text-xs">分数</div>
          <div id="score" class="score-value-display score-digit-container" data-value="0">0</div>
        </div>
        <div class="score-box">
          <div class="text-xs">最高</div>
          <div id="best-score" class="score-value-display score-digit-container" data-value="0">0</div>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-row">
      <button id="btn-undo" class="action-btn" title="撤销">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        撤销
      </button>
      <button id="btn-new" class="action-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"></path><path d="M2.5 22v-6h6"></path><path d="M2.5 11.5a10 10 0 0 1 18.17-4.5L21.5 8"></path><path d="M21.5 12.5a10 10 0 0 1-18.17 4.5L2.5 16"></path></svg>
        新游戏
      </button>
    </div>

    <!-- 得分动画容器 -->
    <div id="score-popup-container"></div>

    <!-- 游戏棋盘（自适应尺寸） -->
    <div class="board-wrapper">
      <div id="game-board" style="position:relative;border-radius:18px;overflow:hidden;">
        <div id="grid-background" class="grid-bg"></div>
        <div id="effects-layer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none;"></div>
        <div id="tile-container"></div>
        <!-- 游戏结束遮罩 -->
        <div id="game-over-overlay" class="game-overlay hidden">
          <div class="overlay-content">
            <h2 style="font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;margin-bottom:8px;">游戏结束!</h2>
            <p style="font-size:clamp(0.85rem,2vw,1.1rem);margin-bottom:12px;">最终得分: <span id="final-score" style="font-weight:bold;">0</span></p>
            <button id="btn-retry" style="color:#fff;font-weight:bold;padding:10px 24px;border-radius:12px;font-size:clamp(0.85rem,2vw,1.1rem);border:none;cursor:pointer;">
              再来一局
            </button>
          </div>
        </div>
        <!-- 胜利遮罩 -->
        <div id="game-win-overlay" class="game-overlay hidden">
          <div class="overlay-content">
            <h2 style="font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;margin-bottom:8px;">🎉 你赢了!</h2>
            <p style="font-size:clamp(0.85rem,2vw,1.1rem);margin-bottom:12px;">恭喜达到2048!</p>
            <div style="display:flex;gap:8px;">
              <button id="btn-continue" style="color:#fff;font-weight:bold;padding:10px 16px;border-radius:12px;font-size:clamp(0.8rem,1.8vw,1rem);border:none;cursor:pointer;">
                继续挑战
              </button>
              <button id="btn-win-retry" style="color:#fff;font-weight:bold;padding:10px 16px;border-radius:12px;font-size:clamp(0.8rem,1.8vw,1rem);background:rgba(100,116,139,0.6)!important;border:none;cursor:pointer;">
                新游戏
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 操作提示 -->
    <div class="hint-row">
      <p id="hint-desktop" class="hidden" style="display:none;">使用 ← ↑ → ↓ 方向键操作 | W A S D 也可以哦</p>
      <p id="hint-mobile" style="display:none;">👆 滑动屏幕移动方块</p>
    </div>

    <!-- 统计信息 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">移动次数</div>
        <div class="value" id="move-count">0</div>
      </div>
      <div class="stat-card">
        <div class="label">最大方块</div>
        <div class="value" id="max-tile">0</div>
      </div>
      <div class="stat-card">
        <div class="label">游戏时间</div>
        <div class="value" id="game-time">0:00</div>
      </div>
    </div>

  </div>

  <!-- 游戏主逻辑 -->
  <script type="module" src="./games/2048/main.js"></script>

  <!-- 自适应棋盘尺寸 & 提示显示 -->
  <script>
    (function() {
      function resizeBoard() {
        var board = document.getElementById('game-board');
        var wrapper = document.querySelector('.board-wrapper');
        if (!board || !wrapper) return;

        var wrapperW = wrapper.clientWidth;
        var wrapperH = wrapper.clientHeight;
        var size = Math.min(wrapperW, wrapperH, 460);

        board.style.width = size + 'px';
        board.style.height = size + 'px';

        // 更新 CSS 变量
        document.documentElement.style.setProperty('--board-size', size + 'px');
        var cellGap = size < 300 ? 6 : (size < 380 ? 8 : 10);
        document.documentElement.style.setProperty('--cell-gap', cellGap + 'px');
        var cellSize = (size - cellGap * 5) / 4;
        document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
      }

      function updateHints() {
        var isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        var hintD = document.getElementById('hint-desktop');
        var hintM = document.getElementById('hint-mobile');
        if (hintD) hintD.style.display = isMobile ? 'none' : 'block';
        if (hintM) hintM.style.display = isMobile ? 'block' : 'none';
      }

      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          resizeBoard();
          updateHints();
        }, 50);
      });

      // 初始调用
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          resizeBoard();
          updateHints();
        });
      } else {
        resizeBoard();
        updateHints();
      }
    })();
  </script>
  <!-- 全局导航栏 -->
  <script type="module">
    import { createNav } from './components/nav.js';
    createNav('games');
  </script>
</body>
</html>
