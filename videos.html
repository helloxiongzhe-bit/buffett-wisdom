<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head><script src="https://with.woa.com/d2c/assets/iframe.js?_t=1775325793690"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频精选 — Buffett Wisdom</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style id="critical-css">
        html, body { background-color: #0a0a0f; }
        html[data-theme="light"], html[data-theme="light"] body { background-color: #fafafa; }
    </style>
    <script>
        (function() {
            var theme = localStorage.getItem('buffett-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
</head>
<body class="grid-bg">
    <div class="radial-glow"></div>
    <div style="padding-top: 80px;" class="page-enter">
        <section style="max-width: 1280px; margin: 0 auto; padding: 0 24px 80px;">
            <div style="margin-bottom: 48px;">
                <h1 style="font-family: var(--font-serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; color: var(--text-primary); margin-bottom: 12px;">
                    <i class="ri-film-line" style="color: var(--accent-blue);"></i> 视频精选
                </h1>
                <p style="color: var(--text-secondary); font-size: 15px; max-width: 600px;">
                    精选股东大会录像、经典采访、演讲和纪录片，通过 YouTube 在页面内直接播放。
                </p>
            </div>

            <!-- 分类筛选 -->
            <div class="filter-group" style="margin-bottom: 32px;" id="category-filters"></div>

            <!-- 视频网格 -->
            <div id="video-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px;"></div>
        </section>
    </div>

    <!-- 视频播放弹窗 -->
    <div id="video-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:100; align-items:center; justify-content:center; padding: 24px;">
        <div style="max-width: 960px; width: 100%; position: relative;">
            <button id="video-modal-close" style="position:absolute; top:-40px; right:0; background:none; border:none; color:#fff; cursor:pointer; font-size:28px; padding:4px;">
                <i class="ri-close-line"></i>
            </button>
            <div class="video-container" id="video-player"></div>
            <div id="video-info" style="margin-top: 16px;"></div>
        </div>
    </div>

    <script type="module">
        import { createNav, createFooter, initRevealAnimations, getGlobalLang } from './components/nav.js';
        import { videos, videoCategories, getVideosByCategory } from './data/videos.js';

        createNav('videos');
        createFooter();

        const _globalLang = getGlobalLang();
        const _isEn = _globalLang === 'en';

        // 更新页面静态文本
        if (_isEn) {
            document.title = 'Videos — Buffett Wisdom';
            const h1 = document.querySelector('h1');
            if (h1) h1.innerHTML = '<i class="ri-film-line" style="color: var(--accent-blue);"></i> Featured Videos';
            const desc = h1 ? h1.parentElement.querySelector('p') : null;
            if (desc) desc.textContent = 'Curated annual meeting recordings, classic interviews, speeches, and documentaries, playable directly via YouTube.';
        }

        let currentCategory = '全部';

        // 渲染分类按钮
        const filtersContainer = document.getElementById('category-filters');
        filtersContainer.innerHTML = videoCategories.map(cat =>
            `<button class="filter-btn ${cat === '全部' ? 'active' : ''}" data-category="${cat}">${cat}</button>`
        ).join('');

        filtersContainer.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                filtersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderVideos();
            });
        });

        function renderVideos() {
            const vids = getVideosByCategory(currentCategory);
            const container = document.getElementById('video-grid');

            container.innerHTML = vids.map(video => `
                <div class="card glow-card reveal" style="cursor: pointer; padding: 0; overflow: hidden;" data-video-id="${video.youtubeId}" data-video-title="${_isEn ? video.titleEn : video.title}">
                    <div style="position: relative; padding-bottom: 56.25%; background: var(--bg-tertiary);">
                        <img src="https://img.youtube.com/vi/${video.youtubeId}/hqdefault.jpg"
                             alt="${video.title}"
                             style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;"
                             loading="lazy"
                             onerror="if(!this.dataset.retry){this.dataset.retry='1';this.src='https://img.youtube.com/vi/${video.youtubeId}/mqdefault.jpg';}else{this.style.display='none';}">
                        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); transition: background 0.2s;">
                            <div style="width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">
                                <i class="ri-play-fill" style="font-size: 28px; color: #111; margin-left: 3px;"></i>
                            </div>
                        </div>
                        <span style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 4px; font-family: var(--font-mono);">${video.duration}</span>
                    </div>
                    <div style="padding: 16px 20px;">
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                            <span style="font-size: 11px; padding: 2px 8px; background: var(--accent-glow); border-radius: 12px; color: var(--accent-blue);">${video.category}</span>
                            <span style="font-size: 12px; color: var(--text-tertiary);">${video.year}</span>
                        </div>
                        <h3 style="font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4;">${_isEn ? video.titleEn : video.title}</h3>
                        <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.6;">${video.description}</p>
                    </div>
                </div>
            `).join('');

            // 绑定点击播放
            container.querySelectorAll('[data-video-id]').forEach(el => {
                el.addEventListener('click', () => {
                    playVideo(el.dataset.videoId, el.dataset.videoTitle);
                });
            });

            initRevealAnimations();
        }

        function playVideo(youtubeId, title) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            const info = document.getElementById('video-info');

            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            info.innerHTML = `<h3 style="font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px;">${title}</h3>`;

            modal.style.display = 'flex';
        }

        function closeVideoModal() {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('video-player');
            player.innerHTML = '';
            modal.style.display = 'none';
        }

        document.getElementById('video-modal-close').addEventListener('click', closeVideoModal);
        document.getElementById('video-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('video-modal')) closeVideoModal();
        });

        renderVideos();
    </script>
</body>
</html>
